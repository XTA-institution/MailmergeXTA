function showSearch() {

// UPLOAD
function upload() {
  const input = document.createElement("input");
  input.type = "file";

  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    const box = document.getElementById("uploadBox");
    const text = document.getElementById("uploadText");
    const bar = document.getElementById("progressBar");

    box.style.display = "block";
    text.innerText = "Uploading...";
    bar.style.width = "10%";

    reader.onload = (e) => {
      const base64 = e.target.result.split(",")[1];

      text.innerHTML = "Uploading... <br><b>" + file.name + "</b>";

      // 🔥 PROGRESS MƯỢT (tăng đều)
      let percent = 5;
      const fake = setInterval(() => {
        percent += 3;

        if (percent >= 85) {
          percent = 85;
          clearInterval(fake);
        }

        bar.style.width = percent + "%";
      }, 120);

      // 🔥 GỬI SERVER
      google.script.run
        .withSuccessHandler((f) => {
          clearInterval(fake);

          // 100%
          bar.style.width = "100%";
          text.innerText = "Hoàn tất ✔";

          // 🔥 HIỂN THỊ FILE NGAY
          allFilesCache.unshift(f);render(allFilesCache);

          // 🔥 delay nhẹ cho mượt
          setTimeout(() => {
            box.style.display = "none";
            bar.style.width = "0%";
          }, 600);
        })
        .withFailureHandler((err) => {
          clearInterval(fake);

          text.innerText = "Upload lỗi!";
        })
        .uploadFile(base64, file.name, file.type);
    };

    // 🔥 đọc file sau khi đã hiện UI
    reader.readAsDataURL(file);
  };

  input.click();
}

// LOAD
function loadFiles() {
  google.script.run.withSuccessHandler(function(files){
    allFilesCache = files; // 🔥 cache lại
    render(files);
  }).getFiles();
}

// SEARCH
function search() {
  const q = document.getElementById("searchInput").value.toLowerCase();

  // 🔥 KHÔNG gọi server nữa
  const filtered = allFilesCache.filter(f =>
    f.name.toLowerCase().includes(q)
  );

  render(filtered);
}

// RENDER
function render(files) {
  const box = document.getElementById("files");

  let html = "";

  files.forEach(f => {
    html += `
    <div class="file"
      onclick="handleClick(event,'${f.id}','${f.url}')">

      <!-- HEADER -->
      <div class="file-header">
        <div class="file-name">${f.name}</div>

        <div class="file-menu" onclick="toggleMenu(event, '${f.id}')">
          ⋮
        </div>

        <div class="dropdown" id="menu-${f.id}">
          <div onclick="duplicateFile('${f.id}')">Tạo bản sao</div>
          <div onclick="renameFile('${f.id}', '${f.name}')">Đổi tên</div>
          <div onclick="deleteFile('${f.id}')">Xóa</div>
        </div>
      </div>

      <!-- PREVIEW -->
      <div class="preview-box">
        <img class="preview"
        src="https://drive.google.com/thumbnail?id=${f.id}&sz=w1000">
      </div>

    </div>
    `;
  });

  box.innerHTML = html;
}

// ADD FILE
function addFile(f) {
  document.getElementById("files").appendChild(createFile(f));
}

// FILE UI
function createFile(f) {
  const preview = `
    <div class="preview-box">
      <img class="preview"
      src="https://drive.google.com/thumbnail?id=${f.id}&sz=w1000">
    </div>
  `;

  const div = document.createElement("div");
  div.className = "file";

  div.innerHTML = `
    ${preview}
    <div class="file-name">${f.name}</div>
  `;

  div.onclick = () => window.open(f.url);

  return div;
}
let selectedFileId = null;

function selectFile(e, id) {
  if (e.target.closest(".file-menu") || e.target.closest(".dropdown")) return;

  document.querySelectorAll(".file").forEach(f => {
    f.classList.remove("selected");
  });

  e.currentTarget.classList.add("selected");
  selectedFileId = id;

  e.stopPropagation();
}

let clickTimer = null;

function handleClick(e, id, url) {
  if (e.target.closest(".file-menu") || e.target.closest(".dropdown")) return;

   if (e.detail === 2) {
    openFile(url);
    return;
  }
  selectFile(e, id);
}

function renameFile(id, oldName){
  const newName = prompt("Nhập tên mới:", oldName);
  if(!newName || newName === oldName) return;

  google.script.run.withSuccessHandler(() => {
    loadFiles();
  }).renameFile(id, newName);
}

function toggleFieldDropdown(){
  saveMergeFieldSelection();

  const box = document.getElementById("fieldDropdown");

  if(box.style.display === "none" || box.style.display === ""){
    renderFieldList();
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}

let savedMergeFieldRange = null;

function saveMergeFieldSelection() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;

  const range = sel.getRangeAt(0);
  const editor = document.getElementById("editor");
  const wrapper = editor?.querySelector(".editor-wrapper");
  if (!wrapper) return;

  if (!wrapper.contains(range.startContainer) || !wrapper.contains(range.endContainer)) return;
  savedMergeFieldRange = range.cloneRange();
}

function restoreMergeFieldSelection() {
  const sel = window.getSelection();
  sel.removeAllRanges();
  if (!savedMergeFieldRange) return;
  sel.addRange(savedMergeFieldRange);
}

function selectClassMM(className){
  document.getElementById("recipientDropdown").style.display = "none";

  // load sheet
  google.script.run.withSuccessHandler(function(url){

    const id = url.split("/d/")[1].split("/")[0];
    mmState.sheetId = id;

    google.script.run.withSuccessHandler(function(names){
     openSheetModal(names);

    }).getSheetNames(id);

  }).getSheetUrl(className);
}

function preview() {
  if (!mmState.data.length) return;

  const row = mmState.data[mmState.index];
  let content = mmState.rawTemplate;

  Object.keys(row).forEach(k => {
    const placeholder = `{{${k}}}`;
    const value = row[k] || "";
    content = content.replaceAll(placeholder, value);
  });

  const html = extractBodyHtml(content);
  renderEditorHtml(html);
}

function extractBodyHtml(html) {
  const temp = document.createElement('div');
  temp.innerHTML = html;

  const body = temp.querySelector('body');
  if (body) return body.innerHTML;

  const htmlEl = temp.querySelector('html');
  if (htmlEl) return htmlEl.innerHTML;

  return html;
}

function normalizeTemplateHtml(html) {
  const temp = document.createElement('div');
  temp.innerHTML = html;

  const body = temp.querySelector('body');
  return body ? body.innerHTML : temp.innerHTML;
}

function renderEditorHtml(html) {
  const editor = document.getElementById("editor");
  editor.innerHTML = "";

  const wrapper = document.createElement("div");
  wrapper.className = "editor-wrapper";
  wrapper.contentEditable = true;
  wrapper.innerHTML = normalizeTemplateHtml(html);

  editor.appendChild(wrapper);
  editor.style.display = "block";

  wrapper.addEventListener("mouseup",  saveMergeFieldSelection);
  wrapper.addEventListener("keyup", saveMergeFieldSelection);
  wrapper.addEventListener("focusin", saveMergeFieldSelection);

}

function nextRecord(){
  if(mmState.index < mmState.data.length - 1){
    mmState.index++;
    preview();
  }
}

function prevRecord(){
  if(mmState.index > 0){
    mmState.index--;
    preview();
  }
}

function finishMerge(){
  let HTML = mmState.rawTemplate;
  
  // Ensure all merge fields are in {{field}} format for merge
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = HTML;
  
  tempDiv.querySelectorAll('.merge-field').forEach(span => {
    const field = span.getAttribute('data-field');
    if(field) {
      const placeholder = document.createTextNode(`{{${field}}}`);
      span.parentNode.replaceChild(placeholder, span);
    }
  });
  
  HTML = tempDiv.innerHTML;
  
  google.script.run
    .withSuccessHandler(function(res){
      alert("Merge hoàn tất! Đã tạo " + res.length + " file.");
      // Refresh projects
      showProjects();
    })
    .mergeDocsFromHtml(
      HTML,
      mmState.sheetId,
      mmState.sheetName
    );
}

function showTemplatePopup(files){
  let list = files.map(f => f.name).join("\n");

  const name = prompt("Chọn template:\n" + list);

  const file = files.find(f => f.name === name);

  if(!file) return alert("Không tìm thấy file!");

  confirmTemplate(file);
}

function confirmTemplate(file){
  if(isCreatingProject) return;
  isCreatingProject = true;

  const ok = confirm(`Chọn "${file.name}" làm template?`);
  if(!ok){
    isCreatingProject = false;
    return;
  }

  google.script.run
    .withSuccessHandler(function(newFile){

      google.script.run
        .withSuccessHandler(function(html){

          renderEditorHtml(html);

          const editor = document.getElementById("editor");
          editor.removeEventListener('click', handleEditorClick);
          editor.addEventListener('click', handleEditorClick);

          document.getElementById("mailingToolbar").style.display = "flex";
          document.getElementById("mmContainer").style.display = "none";

          mmState.content = html;
          mmState.rawTemplate = html;

          isCreatingProject = false;

        })
        .getDocContent(newFile.id);

    })
    .createMailmergeProject(file.id, file.name);
}

// Click-to-insert field handler
function handleEditorClick(e) {
  e.stopPropagation();
  
}

function insertField(field){
  const editor = document.getElementById("editor");
  const wrapper = editor?.querySelector(".editor-wrapper");
  if (!wrapper) return;

  wrapper.focus();
  restoreMergeFieldSelection();

  const selection = window.getSelection();
  if (selection.rangeCount === 0) {
    const range = document.createRange();
    range.selectNodeContents(wrapper);
    range.collapse(false);
    selection.addRange(range);
  }

  const range = selection.getRangeAt(0);
  const span = document.createElement('span');
  span.className = 'merge-field';
  span.textContent = `{{${field}}}`;
  span.setAttribute('data-field', field);

  range.deleteContents();
  range.insertNode(span);

  range.setStartAfter(span);
  range.setEndAfter(span);
  selection.removeAllRanges();
  selection.addRange(range);

  savedMergeFieldRange = range.cloneRange();
  mmState.content = editor.innerHTML;
}
