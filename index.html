<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-wrap">
      <img id="logo">
    </div>
    <div class="title">MAILMERGE XTA</div>
  </div>

  <!-- MENU -->
  <div class="menu">
    <button onclick="navigate('home')">TRANG CHỦ</button>
   <button onclick="navigate('khoi')">THEO DÕI ĐIỂM</button>
   <button onclick="navigate('template')">TEMPLATE</button>
   <button onclick="navigate('mailmerge')">MAILMERGE</button>
   <button onclick="navigate('guide')">HƯỚNG DẪN</button>
  </div>

 <div class="content">

  <!-- TRANG CHỦ -->
  <div id="homePage" class="page">
    <div class="overlay"></div>

    <div class="bottom-text">
      <h3>CÔNG CỤ MAILMERGE CHO NHÂN SỰ XTA</h3>
      <p>Chủ quản: Xưởng tiếng Anh</p>
      <p>Người phụ trách: Lê Đình Phú</p>
    </div>
  </div>

  <!-- TRANG CHỌN KHỐI -->
  <div id="khoiPage" class="page" style="display:none;"> <div class="overlay">
  </div>
  <div class="center-box">
    <div class="title-center" id="pageTitle">Hãy chọn khối lớp
    </div>

    <div class="grid-khoi" id="khoiContainer">
      <div class="btn div1" onclick="showLopTracking(3)">KHỐI 3</div>
      <div class="btn div2" onclick="showLopTracking(4)">KHỐI 4</div>
      <div class="btn div3" onclick="showLopTracking(5)">KHỐI 5</div>

      <div class="btn div4" onclick="showLopTracking('cap2')">KHỐI CẤP 2</div>
      <div></div>
      <div class="btn div5" onclick="showLopTracking('luan')">LỚP LUẬN</div>
    </div>
    <div id="lopContainer" style="margin-top:30px;"></div>
    </div>
  </div>

  <!-- TRANG CHỌN TEMPLATE -->
  <div id="templatePage" class="page" style="display:none;">
  <div class="container-template">
    <!-- MENU TRÁI -->
    <div class="menu-template">
      <div class="menu-title">Menu</div>

      <div id="searchBtn" class="search-btn" onclick="showSearch()">
        Tìm kiếm template
      </div>

      <input id="searchInput"
             class="search-input"
             placeholder="Nhập tên file..."
             oninput="search()"
             onblur="hideSearch()">

      <button onclick="upload()">Upload template</button>
      <button>Tạo template</button>
      <button>Thùng rác</button>
    </div>

    <!-- FILE -->
    <div class="content-template">
      <div class="grid" id="files"></div>
    </div>
  </div>
  </div>
<!-- MAILMERGE PAGE -->
<div id="mailmergePage" class="page" style="display:none;">
  <div class="container-template">

    <!-- MENU TRÁI -->
    <div class="menu-template">
      <div class="menu-title">Menu</div>

      <button onclick="showProjects()">Các lớp đang dở</button>
      <button onclick="showTemplatePicker()">Chọn template</button>
    </div>

    <!-- CONTENT PHẢI -->
    <div class="content-template">

  <!-- TOOLBAR -->
  <div class="mailings-bar" id="mailingToolbar" style="display:none;">

    <button class="toolbar-btn disabled" id="btn-load-class" onclick="openRecipient()">
    <svg viewBox="0 0 24 24"> <g fill="none">
    <path d="M16 7.5a4.5 4.5 0 1 1-9 0a4.5 4.5 0 0 1 9 0"/>
      <path stroke="currentColor" stroke-linecap="square" stroke-width="2" d="M10.75 15H8a5 5 0 0 0-5 5v1h7.8M16 7.5a4.5 4.5 0 1 1-9 0a4.5 4.5 0 0 1 9 0Zm5.25 7.5h-6.5m6.5 3h-6.5m6.5 3h-6.5"/> </g>
      </svg> <span>Select Recipents</span> </button>

    <button class="toolbar-btn" id="btn-edit-recipients">
    <svg viewBox="0 0 24 24">
    <path fill="currentColor" d="M3 6v2h11V6zm0 4v2h11v-2zm17 .1c-.1 0-.3.1-.4.2l-1 1l2.1 2.1l1-1c.2-.2.2-.6 0-.8l-1.3-1.3c-.1-.1-.2-.2-.4-.2m-1.9 1.8l-6.1 6V20h2.1l6.1-6.1zM3 14v2h7v-2z"/> </svg> <span>Edit recipients list</span>
    </button>

    <button onclick="toggleFieldDropdown()">
    <svg viewBox="0 0 16 16">
    <path fill="currentColor" d="M14 16V5l-1 1v9H1V3h9l1-1H0v14z"/>
    <path fill="currentColor" d="M16 1.4L14.6 0L7.8 6.8L6 5v5h5L9.2 8.2z"/> </svg> <span>Insert field</span>
    </button>

    <button class="toolbar-btn" id="btn-preview-results">
    <svg viewBox="0 0 16 16">
    <path fill="none" stroke="currentColor" d="M2 8h3m-3 4.5h4m-4-9h12m-2.479 7.021l2.066 2.066m-1.18-4.131a2.951 2.951 0 1 1-5.902 0a2.951 2.951 0 0 1 5.902 0Z"/> </svg> <span>Preview results</span> </button>

    <button onclick="prevRecord()">←</button>

    <button onclick="nextRecord()">→</button>

    <button class="toolbar-btn" id="btn-merge" onclick="finishMerge()">
    <svg viewBox="0 0 1024 1024">
    <path fill="currentColor" d="M688 312v-48c0-4.4-3.6-8-8-8H296c-4.4 0-8 3.6-8 8v48c0 4.4 3.6 8 8 8h384c4.4 0 8-3.6 8-8m-392 88c-4.4 0-8 3.6-8 8v48c0 4.4 3.6 8 8 8h184c4.4 0 8-3.6 8-8v-48c0-4.4-3.6-8-8-8zm376 116c-119.3 0-216 96.7-216 216s96.7 216 216 216s216-96.7 216-216s-96.7-216-216-216m107.5 323.5C750.8 868.2 712.6 884 672 884s-78.8-15.8-107.5-44.5S520 772.6 520 732s15.8-78.8 44.5-107.5S631.4 580 672 580s78.8 15.8 107.5 44.5S824 691.4 824 732s-15.8 78.8-44.5 107.5M761 656h-44.3c-2.6 0-5 1.2-6.5 3.3l-63.5 87.8l-23.1-31.9a7.92 7.92 0 0 0-6.5-3.3H573c-6.5 0-10.3 7.4-6.5 12.7l73.8 102.1c3.2 4.4 9.7 4.4 12.9 0l114.2-158c3.9-5.3.1-12.7-6.4-12.7M440 852H208V148h560v344c0 4.4 3.6 8 8 8h56c4.4 0 8-3.6 8-8V108c0-17.7-14.3-32-32-32H168c-17.7 0-32 14.3-32 32v784c0 17.7 14.3 32 32 32h272c4.4 0 8-3.6 8-8v-56c0-4.4-3.6-8-8-8"/> </svg>
    <span>Finish & Merge</span> </button>
  </div>
  
  <div id="recipientDropdown" style="
  display:none;
  position:absolute;
  background:white;
  border:1px solid #ccc;
  border-radius:10px;
  margin-top:5px;
  z-index:999;
  width:250px;
  max-height:300px;
  overflow-y:auto;
  "></div>

  <!-- DROPDOWN FIELD -->
  <div id="fieldDropdown" style="display:none;"></div>
  <div id="mmContainer" class="grid"></div>
  <!-- EDITOR -->
  <div id="editor" style="display:none; background:white; border-radius:10px; margin-top:15px;"></div>

</div>

   </div>
   </div>
</div>
</body>
</html>
